name: Build ViennaPS Complete Wheel (Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python tools and vcpkg deps
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install vtk embree --triplet x64-windows
          cd ..

      - name: Build wheel with PATH containing vcpkg binaries
        shell: cmd
        run: |
          set PATH=%CD%\vcpkg\installed\x64-windows\bin;%PATH%
          set CMAKE_PREFIX_PATH=%CD%\vcpkg\installed\x64-windows
          set CMAKE_GENERATOR=Visual Studio 17 2022
          pip wheel . --no-build-isolation --wheel-dir=dist

      - name: Repair wheel with delvewheel (ensure all DLLs are bundled)
        run: |
          delvewheel repair --add-path=%CD%\vcpkg\installed\x64-windows\bin --with-imports --wheel-dir=dist_fixed dist\*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel-final
          path: dist_fixed\*.whl
