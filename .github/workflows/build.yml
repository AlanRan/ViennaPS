name: Build ViennaPS wheel (Python 3.10 only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install delvewheel
        run: pip install delvewheel

      - name: Build wheel
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Repair wheel (auto-fix missing DLLs)
        run: delvewheel repair dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
