name: Build ViennaPS wheel (Python 3.10, vcpkg)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 安装构建工具和 delvewheel
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      # 利用缓存加速 vcpkg 安装
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      # 安装 vcpkg 并使用它安装 VTK 和 Embree
      - name: Install VTK and Embree via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install vtk embree --triplet x64-windows
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      # 设置 ViennaPS 寻找依赖的路径
      - name: Configure CMake lookup paths
        run: |
          $lookup = "${{ env.VCPKG_ROOT }}/installed/x64-windows"
          echo "VIENNAPS_LOOKUP_DIRS=$lookup" >> $env:GITHUB_ENV

      # 构建 wheel（自动拉取 ViennaLS 等 ViennaTools 依赖）
      - name: Build wheel
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      # 自动修复缺失 DLL（从 vcpkg 和 Python 环境中收集）
      - name: Repair wheel (bundle DLLs)
        run: |
          $vcpkg_bin = "${{ env.VCPKG_ROOT }}/installed/x64-windows/bin"
          delvewheel repair --add-path=$vcpkg_bin dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
