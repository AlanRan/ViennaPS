name: Build ViennaPS Wheel (Manual Assembly)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cmake ninja

      - name: Setup vcpkg and install dependencies
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Build _core.pyd (without install)
        shell: cmd
        run: |
          set PATH=%CD%\vcpkg\installed\x64-windows\bin;%PATH%
          set CMAKE_PREFIX_PATH=%CD%\vcpkg\installed\x64-windows
          set CMAKE_GENERATOR=Visual Studio 17 2022
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target _core

      - name: Create staging directory and copy core files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wheel_staging\viennaps | Out-Null
          New-Item -ItemType Directory -Force -Path wheel_staging\viennaps-4.5.0.dist-info | Out-Null
          Copy-Item "build\viennaps\Release\_core.cp310-win_amd64.pyd" -Destination "wheel_staging\viennaps\"
          Copy-Item "python\__init__.py" -Destination "wheel_staging\viennaps\"

      - name: Copy required DLLs
        shell: pwsh
        run: |
          $DLL_SRC = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          $DLLS = @("embree4.dll","vtkCommonCore-9.3.dll","vtkCommonDataModel-9.3.dll","vtkCommonExecutionModel-9.3.dll","vtkCommonTransforms-9.3.dll","vtkFiltersCore-9.3.dll","vtkFiltersGeneral-9.3.dll","vtkFiltersGeometry-9.3.dll","vtkIOImage-9.3.dll","vtkIOXML-9.3.dll","vtkInteractionStyle-9.3.dll","vtkRenderingAnnotation-9.3.dll","vtkRenderingCore-9.3.dll","vtkRenderingFreeType-9.3.dll","vtkRenderingOpenGL2-9.3.dll","vtkRenderingUI-9.3.dll","vtksys-9.3.dll","libomp140.x86_64.dll")
          foreach ($dll in $DLLS) {
            $src = Join-Path $DLL_SRC $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination "wheel_staging\viennaps\" -Force
            } else {
              Write-Host "Warning: $dll not found" -ForegroundColor Yellow
            }
          }

      - name: Generate METADATA, WHEEL and RECORD
        shell: pwsh
        run: |
          $distInfo = "wheel_staging\viennaps-4.5.0.dist-info"
          # ---- METADATA ----
          $meta = @(
            "Name: ViennaPS",
            "Version: 4.5.0",
            "Summary: Process Simulation Package",
            "Author: ViennaPS Team",
            "License: Apache-2.0",
            "Requires-Python: >=3.8",
            "Classifier: Programming Language :: Python :: 3"
          ) -join "`r`n"
          Set-Content -Path "$distInfo\METADATA" -Value $meta -Encoding UTF8

          # ---- WHEEL ----
          $wheel = @(
            "Wheel-Version: 1.0",
            "Generator: manual",
            "Root-Is-Purelib: false",
            "Tag: cp310-cp310-win_amd64"
          ) -join "`r`n"
          Set-Content -Path "$distInfo\WHEEL" -Value $wheel

          # ---- RECORD ----
          $recordLines = @()
          $base = (Get-Item "wheel_staging").FullName
          Get-ChildItem -Path "wheel_staging" -Recurse -File | ForEach-Object {
            $full = $_.FullName
            $rel = $full.Substring($base.Length + 1) -replace '\\', '/'
            $bytes = [System.IO.File]::ReadAllBytes($full)
            $sha = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
            $hash = [Convert]::ToBase64String($sha)
            $recordLines += "$rel,sha256=$hash,$($bytes.Length)"
          }
          # Add RECORD entry itself (placeholder)
          $recordRel = (Get-Item "$distInfo\RECORD").FullName.Substring($base.Length + 1) -replace '\\', '/'
          $recordLines += "$recordRel,,"
          $recordLines -join "`r`n" | Set-Content -Path "$distInfo\RECORD"

      - name: Package wheel (ZIP)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "wheel_staging\*" -DestinationPath "dist\ViennaPS-4.5.0-cp310-cp310-win_amd64.whl" -Force
          Write-Host "Wheel created: dist\ViennaPS-4.5.0-cp310-cp310-win_amd64.whl" -ForegroundColor Green

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel
          path: dist\*.whl
