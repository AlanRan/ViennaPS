name: Build ViennaPS Complete Wheel (Final Working)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          mkdir overlay_triplets
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content overlay_triplets\x64-windows.cmake

      - name: Setup vcpkg and install dependencies (classic mode + custom triplet)
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install vtk embree --triplet x64-windows --overlay-triplets=..\overlay_triplets --classic
          cd ..

      - name: Build wheel with correct PATH
        shell: cmd
        run: |
          set PATH=%CD%\vcpkg\installed\x64-windows\bin;%PATH%
          set CMAKE_PREFIX_PATH=%CD%\vcpkg\installed\x64-windows
          set CMAKE_GENERATOR=Visual Studio 17 2022
          pip wheel . --no-build-isolation --wheel-dir=dist

      - name: Repair wheel (bundle DLLs, now without hash)
        run: |
          delvewheel repair --add-path=%CD%\vcpkg\installed\x64-windows\bin --wheel-dir=dist_fixed dist\*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel-final
          path: dist_fixed\*.whl
