name: Build ViennaPS Complete Wheel (Final Correct)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install delvewheel

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Install VTK and Embree via vcpkg
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows --classic

      - name: Build _core.pyd only
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:VCPKG_ROOT\installed\x64-windows" -DCMAKE_GENERATOR="Visual Studio 17 2022" -DVIENNAPS_BUILD_PYTHON_BINDINGS=ON -DBUILD_SHARED_LIBS=ON
          cmake --build . --config Release --target _core

      - name: Pack wheel manually
        shell: pwsh
        run: |
          $wheelDir = "dist"
          New-Item -ItemType Directory -Force -Path "$wheelDir\viennaps"
          Copy-Item "build\viennaps\Release\_core.cp310-win_amd64.pyd" "$wheelDir\viennaps\"
          Copy-Item "python\__init__.py" "$wheelDir\viennaps\"

          $distInfo = "$wheelDir\viennaps-4.5.0.dist-info"
          New-Item -ItemType Directory -Force -Path $distInfo

          @"
Metadata-Version: 2.1
Name: viennaps
Version: 4.5.0
Requires-Dist: viennals>=5.7.2
"@ | Set-Content -Path "$distInfo\METADATA"

          @"
Wheel-Version: 1.0
Generator: manual
Root-Is-Purelib: false
Tag: cp310-cp310-win_amd64
"@ | Set-Content -Path "$distInfo\WHEEL"

          Set-Content -Path "$distInfo\RECORD" -Value ""

          python -c "import zipfile, os; whl_name='viennaps-4.5.0-cp310-cp310-win_amd64.whl'; z=zipfile.ZipFile(whl_name,'w',zipfile.ZIP_DEFLATED); [z.write(os.path.join(r,f),os.path.relpath(os.path.join(r,f),'dist')) for r,_,fs in os.walk('dist') for f in fs]; z.close()"

      - name: Bundle all DLLs with delvewheel
        run: |
          $dll_dir = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          delvewheel repair --add-path="$dll_dir" --with-imports --wheel-dir=dist_fixed *.whl

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-windows-complete
          path: dist_fixed\*.whl
