name: Build ViennaPS wheel (Fixed)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path overlay_triplets | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content -Path overlay_triplets\x64-windows.cmake

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install VTK and Embree via vcpkg
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          cd $VCPKG_ROOT
          .\bootstrap-vcpkg.bat
          # 使用自定义 triplet 并加 --classic 避免 manifest 模式
          .\vcpkg install vtk embree --triplet x64-windows --overlay-triplets="${{ github.workspace }}\overlay_triplets" --classic
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Patch python/CMakeLists.txt to skip runtime dependency resolution
        shell: pwsh
        run: |
          $file = "python\CMakeLists.txt"
          $content = Get-Content $file -Raw
          # 查找并注释掉 install(CODE ... file(GET_RUNTIME_DEPENDENCIES ...)) 部分
          $pattern = '(install\s*\(\s*CODE\s*"\s*file\s*\(\s*GET_RUNTIME_DEPENDENCIES[\s\S]*?\)\s*"\s*\))'
          $replacement = '# $1  # Skipped to avoid missing DLL errors during wheel build'
          $newContent = $content -replace $pattern, $replacement
          Set-Content $file $newContent -NoNewline
          # 验证补丁
          if (Select-String -Path $file -Pattern "Skipped to avoid missing DLL errors") {
            Write-Host "Patch applied successfully."
          } else {
            Write-Host "Warning: Patch may not have been applied correctly." -ForegroundColor Yellow
          }

      - name: Build wheel
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          $env:CMAKE_PREFIX_PATH="$VCPKG_ROOT\installed\x64-windows"
          $env:VIENNAPS_LOOKUP_DIRS="$VCPKG_ROOT\installed\x64-windows"
          pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Repair wheel (bundle DLLs)
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          # 确保路径中有 DLL
          $env:PATH="$VCPKG_ROOT\installed\x64-windows\bin;$env:PATH"
          delvewheel repair --add-path="$VCPKG_ROOT\installed\x64-windows\bin" dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
