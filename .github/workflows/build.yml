name: Build ViennaPS wheel (Python 3.10)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build prerequisites and VTK
        run: |
          python -m pip install --upgrade pip
          pip install vtk pybind11 scikit-build-core cmake ninja delvewheel

      - name: Build wheel
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"
          CMAKE_PREFIX_PATH: ${{ env.pythonLocation }}   # 自动找到 VTK CMake 配置

      - name: Repair wheel (bundle all DLLs)
        run: delvewheel repair dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
