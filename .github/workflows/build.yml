name: Build ViennaPS Complete Wheel (Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Install VTK and Embree via vcpkg (Classic Mode)
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows --classic

      - name: Build wheel (skip runtime dependency resolution)
        run: |
          $env:CMAKE_PREFIX_PATH = "$env:VCPKG_ROOT\installed\x64-windows"
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          $env:CMAKE_ARGS = "-DCMAKE_SKIP_INSTALL_RUNTIME_DEPENDENCIES=ON"
          pip wheel . --no-build-isolation --wheel-dir=dist --verbose

      - name: List wheel contents (debug)
        run: |
          python -c "import glob, zipfile; whls=glob.glob('dist/*.whl'); [print(f'\n{w}:', *zipfile.ZipFile(w).namelist()[:20], sep='\n') for w in whls]"

      - name: Repair wheels (bundle all DLLs, including indirect dependencies)
        run: |
          $dll_dir = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          # --with-imports 递归包含间接依赖，--no-mangle-all 禁止名称混淆
          delvewheel repair --add-path="$dll_dir" --with-imports --no-mangle-all --wheel-dir=dist_fixed dist\*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-windows-complete
          path: dist_fixed\*.whl
