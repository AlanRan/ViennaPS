name: Build ViennaPS wheel (Python 3.10, vcpkg)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ runner.temp }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Install VTK and Embree via vcpkg (in temp directory)
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}
          cd ${{ env.VCPKG_ROOT }}
          .\bootstrap-vcpkg.bat
          .\vcpkg install vtk embree --triplet x64-windows

      - name: Set VIENNAPS_LOOKUP_DIRS
        run: |
          echo "VIENNAPS_LOOKUP_DIRS=${{ env.VCPKG_ROOT }}/installed/x64-windows" >> $env:GITHUB_ENV

      - name: Build wheel
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Repair wheel (bundle DLLs)
        run: |
          $vcpkg_bin = "${{ env.VCPKG_ROOT }}/installed/x64-windows/bin"
          delvewheel repair --add-path=$vcpkg_bin dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
