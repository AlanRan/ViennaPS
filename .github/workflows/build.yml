name: Build ViennaPS Wheel (Manifest Mode - Fully Fixed)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      # 1. 创建自定义 triplet 以禁用 DLL 哈希
      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path overlay_triplets | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content -Path overlay_triplets\x64-windows.cmake

      # 2. 修改 vcpkg.json，添加 vtk 和 embree 依赖（manifest 模式）
      - name: Patch vcpkg.json to add VTK and Embree dependencies
        shell: pwsh
        run: |
          $file = "vcpkg.json"
          $json = Get-Content $file -Raw | ConvertFrom-Json
          # 如果 dependencies 不存在，创建空数组
          if (-not $json.dependencies) {
            $json | Add-Member -MemberType NoteProperty -Name "dependencies" -Value @()
          }
          # 添加 vtk 和 embree（如果尚未添加）
          $deps = $json.dependencies
          if ("vtk" -notin $deps) { $deps += "vtk" }
          if ("embree" -notin $deps) { $deps += "embree" }
          $json.dependencies = $deps
          # 写回文件
          $json | ConvertTo-Json -Depth 10 | Set-Content $file -Encoding UTF8
          # 验证修改
          Write-Host "Updated vcpkg.json:"
          Get-Content $file

      # 3. 安装 vcpkg 并使用 manifest 模式安装依赖（不指定包名）
      - name: Setup vcpkg and install dependencies (manifest mode)
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          if (Test-Path $VCPKG_ROOT) { Remove-Item -Recurse -Force $VCPKG_ROOT }
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          cd $VCPKG_ROOT
          .\bootstrap-vcpkg.bat
          # 使用 manifest 模式，不指定包名，仅指定 triplet 和 overlay-triplets
          .\vcpkg install --triplet x64-windows --overlay-triplets="${{ github.workspace }}\overlay_triplets"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      # 4. 下载并提取 OpenMP 运行时（vcpkg 的 llvm 可能不提供，我们手动提供）
      - name: Download and extract OpenMP runtime library
        shell: pwsh
        run: |
          $dll_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/LLVM-18.1.8-win64.exe"
          $installer = "LLVM-18.1.8-win64.exe"
          Invoke-WebRequest -Uri $dll_url -OutFile $installer
          $install_dir = "${{ runner.temp }}\llvm_temp"
          Start-Process -FilePath $installer -ArgumentList "/S /D=$install_dir" -Wait
          Copy-Item "$install_dir\bin\libomp140.x86_64.dll" -Destination "$env:VCPKG_ROOT\installed\x64-windows\bin\"
          Remove-Item -Recurse -Force $install_dir
          Remove-Item $installer

      # 5. 构建 wheel（CMake 会自动找到 vcpkg 安装的依赖）
      - name: Build wheel
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          $env:CMAKE_PREFIX_PATH="$VCPKG_ROOT\installed\x64-windows"
          $env:VIENNAPS_LOOKUP_DIRS="$VCPKG_ROOT\installed\x64-windows"
          pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      # 6. 修复 wheel（打包所有 DLL，包括 OpenMP）
      - name: Repair wheel (bundle all DLLs)
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          $dll_dir="$VCPKG_ROOT\installed\x64-windows\bin"
          $env:PATH="$dll_dir;$env:PATH"
          delvewheel repair --add-path="$dll_dir" dist\*.whl -w dist_fixed

      # 7. 上传最终产物
      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
