name: Build ViennaPS Complete Wheel fix (Windows, Classic vcpkg)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel pybind11

      - name: Setup vcpkg (classic mode)
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Install VTK and Embree via vcpkg
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows --classic

      - name: Build wheel
        run: |
          $env:CMAKE_PREFIX_PATH = "$env:VCPKG_ROOT\installed\x64-windows"
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          pip wheel . --no-build-isolation --wheel-dir=dist --verbose

      - name: List wheel contents (debug)
        run: |
          python -c "import zipfile, glob; zf = zipfile.ZipFile(glob.glob('dist/*.whl')[0]); print('\n'.join(zf.namelist()))"

      - name: Repair wheel (bundle all DLLs, including indirect dependencies)
        run: |
          $dll_dir = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          # --add-path 添加搜索目录，--with-imports 包含所有间接依赖
          delvewheel repair --add-path="$dll_dir" --with-imports --no-mangle --wheel-dir=dist_fixed dist\*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-windows-complete
          path: dist_fixed\*.whl
