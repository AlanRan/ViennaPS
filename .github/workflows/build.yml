name: Build ViennaPS Complete Wheel (Final Reliable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path overlay_triplets | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content -Path overlay_triplets\x64-windows.cmake

      - name: Setup vcpkg and install dependencies
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows --overlay-triplets=overlay_triplets --classic
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Patch python/CMakeLists.txt to skip runtime dependency resolution
        shell: pwsh
        run: |
          $file = "python\CMakeLists.txt"
          $content = Get-Content $file -Raw
          # 注释掉 install(CODE ...) 中调用的 file(GET_RUNTIME_DEPENDENCIES ...) 部分
          $pattern = '(install\s*\(\s*CODE\s*"\s*file\s*\(\s*GET_RUNTIME_DEPENDENCIES[\s\S]*?\)\s*"\s*\))'
          $replacement = '# $1  # Skipped for manual wheel repair'
          $newContent = $content -replace $pattern, $replacement
          Set-Content $file $newContent -NoNewline
          # 验证补丁是否成功
          if (Select-String -Path $file -Pattern "Skipped for manual wheel repair") {
            Write-Host "Patch applied successfully."
          } else {
            Write-Host "Patch might have failed!" -ForegroundColor Yellow
          }

      - name: Build project (including Python module)
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
          $env:CMAKE_PREFIX_PATH = "${{ github.workspace }}\vcpkg\installed\x64-windows"
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Locate _core.pyd and __init__.py
        shell: pwsh
        run: |
          # List all files for debugging
          Get-ChildItem -Path build -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          # Try to find _core.pyd
          $pyd = Get-ChildItem -Path build -Recurse -Filter "_core*.pyd" | Select-Object -First 1
          if (-not $pyd) {
            # Fallback to known path
            $pyd = Get-Item -Path "build\viennaps\Release\_core.cp310-win_amd64.pyd" -ErrorAction SilentlyContinue
          }
          if ($pyd) {
            Write-Host "Found _core.pyd at: $($pyd.FullName)"
            $env:CORE_PYD = $pyd.FullName
          } else {
            Write-Error "ERROR: _core.pyd not found!"
            exit 1
          }
          # Find __init__.py (usually in python/viennaps/__init__.py)
          $init = Get-ChildItem -Path python -Recurse -Filter "__init__.py" | Where-Object { $_.Directory.Name -eq "viennaps" } | Select-Object -First 1
          if ($init) {
            Write-Host "Found __init__.py at: $($init.FullName)"
            $env:INIT_PY = $init.FullName
          } else {
            Write-Error "ERROR: __init__.py not found!"
            exit 1
          }

      - name: Build wheel (without install step)
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
          $env:CMAKE_PREFIX_PATH = "${{ github.workspace }}\vcpkg\installed\x64-windows"
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          # 由于我们修补了 CMakeLists.txt，install 步骤的依赖解析已被跳过，所以 pip wheel 会成功
          pip wheel . --no-build-isolation --wheel-dir=dist

      - name: Repair wheel with delvewheel
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
          $dll_dir = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin"
          # 修复所有 wheel 文件
          Get-ChildItem -Path dist -Filter "*.whl" | ForEach-Object {
            $wheel = $_.FullName
            delvewheel repair --add-path $dll_dir --wheel-dir dist_fixed $wheel
          }

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel-final
          path: dist_fixed\*.whl
