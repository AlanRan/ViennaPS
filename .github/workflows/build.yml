name: Build ViennaPS Wheel (Patch install)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path overlay_triplets | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content -Path overlay_triplets\x64-windows.cmake

      - name: Install VTK and Embree via vcpkg
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          if (Test-Path $VCPKG_ROOT) { Remove-Item -Recurse -Force $VCPKG_ROOT }
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          cd $VCPKG_ROOT
          .\bootstrap-vcpkg.bat
          .\vcpkg install vtk embree --triplet x64-windows --overlay-triplets="${{ github.workspace }}\overlay_triplets" --classic
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Download and extract OpenMP runtime library (from LLVM installer)
        shell: pwsh
        run: |
          $exe_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/LLVM-18.1.8-win64.exe"
          $installer = "LLVM-18.1.8-win64.exe"
          Invoke-WebRequest -Uri $exe_url -OutFile $installer
          $install_dir = "${{ runner.temp }}\llvm"
          Start-Process -FilePath $installer -ArgumentList "/S /D=$install_dir" -Wait
          $dll = Get-ChildItem -Path $install_dir -Recurse -Filter "libomp*.dll" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName -Destination "$env:VCPKG_ROOT\installed\x64-windows\bin\"
            Write-Host "OpenMP DLL copied: $($dll.Name)"
          } else {
            Write-Error "OpenMP DLL not found"
            exit 1
          }
          Remove-Item $installer
          Remove-Item -Recurse -Force $install_dir

      - name: Patch python/CMakeLists.txt to skip runtime dependency resolution
        shell: pwsh
        run: |
          $file = "python\CMakeLists.txt"
          $content = Get-Content $file -Raw
          # 模式1：匹配 install(CODE ... file(GET_RUNTIME_DEPENDENCIES ...))
          $pattern1 = '(install\s*\(\s*CODE\s*"\s*file\s*\(\s*GET_RUNTIME_DEPENDENCIES[\s\S]*?\)\s*"\s*\))'
          if ($content -match $pattern1) {
            $newContent = $content -replace $pattern1, '# $1  # Skipped to avoid missing DLL errors'
            Set-Content $file $newContent -NoNewline
            Write-Host "Patch applied successfully (pattern1)."
          } else {
            # 模式2：匹配 install(TARGETS ... RUNTIME_DEPENDENCIES ...)
            $pattern2 = '(install\s*\(\s*TARGETS\s+\${PYTHON_MODULE_NAME}[\s\S]*?RUNTIME_DEPENDENCIES[\s\S]*?\))'
            if ($content -match $pattern2) {
              $newContent = $content -replace $pattern2, '# $1  # Skipped to avoid missing DLL errors'
              Set-Content $file $newContent -NoNewline
              Write-Host "Patch applied successfully (pattern2)."
            } else {
              Write-Error "Could not find any install command with RUNTIME_DEPENDENCIES. Please check python/CMakeLists.txt"
              exit 1
            }
          }

      - name: Build wheel
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          $env:CMAKE_PREFIX_PATH="$VCPKG_ROOT\installed\x64-windows"
          $env:VIENNAPS_LOOKUP_DIRS="$VCPKG_ROOT\installed\x64-windows"
          pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Repair wheel (bundle all DLLs including OpenMP)
        run: |
          $VCPKG_ROOT="${{ runner.temp }}\vcpkg"
          $dll_dir="$VCPKG_ROOT\installed\x64-windows\bin"
          $env:PATH="$dll_dir;$env:PATH"
          delvewheel repair --add-path="$dll_dir" dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
