name: Build ViennaPS wheel (Python 3.10, windows-2022)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Cache CPM and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/CPM
            build/_deps
          key: ${{ runner.os }}-cpm-${{ hashFiles('cmake/cpm.cmake') }}

      - name: Build and install ViennaLS first
        run: |
          git clone https://github.com/ViennaTools/viennals.git
          cd viennals
          pip install . --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Build ViennaPS wheel
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Repair wheel (bundle all DLLs)
        run: delvewheel repair dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
