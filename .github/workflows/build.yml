name: Build ViennaPS Windows Wheel

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x64'
        # 为了更好的兼容性，可开启此选项下载稳定版Python
        # allow-prereleases: false  

    # 1. 安装 scikit-build-core 作为构建后端
    #    ViennaPS 使用它通过 CMake 构建 Python 绑定
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install scikit-build-core

    # 2. 设置 vcpkg 环境
    #    严格按照官方 CI 的流程
    - name: Setup vcpkg
      shell: pwsh
      run: |
        $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
        git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
        & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
        echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

    # 3. 安装核心依赖
    #    这是确保 VTP 文件非空的关键：必须安装 VTK (9.0+) 和 Embree (4.0+)
    - name: Install dependencies via vcpkg
      run: |
        & "$env:VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows

    # 4. 构建 Wheel
    #    最关键的一步：通过环境变量将依赖路径传递给 CMake
    - name: Build Wheel
      run: |
        $env:CMAKE_PREFIX_PATH = "$env:VCPKG_ROOT\installed\x64-windows"
        # 你也可以选择显式指定查找目录 (两者作用类似)
        # $env:VIENNAPS_LOOKUP_DIRS = "$env:VCPKG_ROOT\installed\x64-windows"
        pip wheel . --no-build-isolation --wheel-dir=dist

    # 5. 打包和修复依赖
    #    使用 delvewheel 将所需的 DLL 都捆绑进最终的 wheel 文件中
    - name: Repair Wheel (Bundling DLLs)
      run: |
        pip install delvewheel
        delvewheel repair dist\viennaps*.whl --add-path "$env:VCPKG_ROOT\installed\x64-windows\bin" --no-mangle --wheel-dir=dist_fixed

    # 6. 上传生成结果
    - uses: actions/upload-artifact@v4
      with:
        name: viennaps-windows-wheel
        path: dist_fixed\*.whl
