name: Build ViennaPS Complete Wheel (Final - No target)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja

      - name: Create custom vcpkg triplet (disable DLL hashing)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path overlay_triplets | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_POLICY_DLLS_WITHOUT_HASH enabled)
          "@ | Set-Content -Path overlay_triplets\x64-windows.cmake

      - name: Setup vcpkg and install dependencies
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows --overlay-triplets=overlay_triplets --classic
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Build entire project (including Python module)
        shell: cmd
        run: |
          set PATH=%CD%\vcpkg\installed\x64-windows\bin;%PATH%
          set CMAKE_PREFIX_PATH=%CD%\vcpkg\installed\x64-windows
          set CMAKE_GENERATOR=Visual Studio 17 2022
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Locate generated _core.pyd and __init__.py
        shell: pwsh
        run: |
          # 查找 _core.pyd
          $pyd = Get-ChildItem -Path build -Recurse -Filter "_core*.pyd" | Select-Object -First 1
          if ($pyd) {
            Write-Host "Found _core.pyd at: $($pyd.FullName)"
            $env:CORE_PYD = $pyd.FullName
          } else {
            Write-Host "ERROR: _core.pyd not found!" -ForegroundColor Red
            exit 1
          }
          # 查找 __init__.py
          $init = Get-ChildItem -Path . -Recurse -Filter "__init__.py" | Where-Object { $_.Directory.Name -eq "viennaps" -and $_.Directory.Parent.Name -eq "python" } | Select-Object -First 1
          if ($init) {
            Write-Host "Found __init__.py at: $($init.FullName)"
            $env:INIT_PY = $init.FullName
          } else {
            Write-Host "ERROR: __init__.py not found!" -ForegroundColor Red
            exit 1
          }

      - name: Create staging directory and copy core files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path wheel_staging\viennaps | Out-Null
          New-Item -ItemType Directory -Force -Path wheel_staging\viennaps-4.5.0.dist-info | Out-Null
          Copy-Item $env:CORE_PYD -Destination "wheel_staging\viennaps\"
          Copy-Item $env:INIT_PY -Destination "wheel_staging\viennaps\"

      - name: Copy all required DLLs from vcpkg
        shell: pwsh
        run: |
          $DLL_SRC = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          Get-ChildItem $DLL_SRC -Filter *.dll | ForEach-Object { Write-Host "Found: $($_.Name)" }
          $DLLS = @(
            "embree4.dll",
            "vtkCommonCore-9.3.dll",
            "vtkCommonDataModel-9.3.dll",
            "vtkCommonExecutionModel-9.3.dll",
            "vtkCommonTransforms-9.3.dll",
            "vtkFiltersCore-9.3.dll",
            "vtkFiltersGeneral-9.3.dll",
            "vtkFiltersGeometry-9.3.dll",
            "vtkIOImage-9.3.dll",
            "vtkIOXML-9.3.dll",
            "vtkInteractionStyle-9.3.dll",
            "vtkRenderingAnnotation-9.3.dll",
            "vtkRenderingCore-9.3.dll",
            "vtkRenderingFreeType-9.3.dll",
            "vtkRenderingOpenGL2-9.3.dll",
            "vtkRenderingUI-9.3.dll",
            "vtksys-9.3.dll",
            "libomp140.x86_64.dll"
          )
          foreach ($dll in $DLLS) {
            $src = Join-Path $DLL_SRC $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination "wheel_staging\viennaps\" -Force
              Write-Host "Copied: $dll"
            } else {
              Write-Host "Warning: $dll not found" -ForegroundColor Yellow
            }
          }

      - name: Generate METADATA, WHEEL and RECORD
        shell: pwsh
        run: |
          $distInfo = "wheel_staging\viennaps-4.5.0.dist-info"
          $meta = @(
            "Name: ViennaPS",
            "Version: 4.5.0",
            "Summary: Process Simulation Package",
            "Author: ViennaPS Team",
            "License: Apache-2.0",
            "Requires-Python: >=3.8",
            "Classifier: Programming Language :: Python :: 3"
          ) -join "`r`n"
          Set-Content -Path "$distInfo\METADATA" -Value $meta -Encoding UTF8

          $wheel = @(
            "Wheel-Version: 1.0",
            "Generator: manual",
            "Root-Is-Purelib: false",
            "Tag: cp310-cp310-win_amd64"
          ) -join "`r`n"
          Set-Content -Path "$distInfo\WHEEL" -Value $wheel

          $recordLines = @()
          $base = (Get-Item "wheel_staging").FullName
          Get-ChildItem -Path "wheel_staging" -Recurse -File | ForEach-Object {
            $full = $_.FullName
            $rel = $full.Substring($base.Length + 1) -replace '\\', '/'
            $bytes = [System.IO.File]::ReadAllBytes($full)
            $sha = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
            $hash = [Convert]::ToBase64String($sha)
            $recordLines += "$rel,sha256=$hash,$($bytes.Length)"
          }
          $recordRel = (Get-Item "$distInfo\RECORD").FullName.Substring($base.Length + 1) -replace '\\', '/'
          $recordLines += "$recordRel,,"
          $recordLines -join "`r`n" | Set-Content -Path "$distInfo\RECORD"

      - name: Package as .whl (ZIP)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "wheel_staging\*" -DestinationPath "dist\ViennaPS-4.5.0-cp310-cp310-win_amd64.whl" -Force
          Write-Host "Wheel created successfully." -ForegroundColor Green

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel-manual
          path: dist\*.whl
