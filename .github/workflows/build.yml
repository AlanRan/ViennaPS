name: Build ViennaPS wheel (Python 3.10)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core cmake ninja delvewheel

      - name: Build wheel (let CMake auto-detect generator)
        run: pip wheel . --wheel-dir=dist --no-build-isolation
        # 注意：不再设置 CMAKE_GENERATOR 环境变量

      - name: Repair wheel (auto-fix DLLs)
        run: delvewheel repair dist\*.whl -w dist_fixed

      - uses: actions/upload-artifact@v4
        with:
          name: viennaps-py310-fixed
          path: dist_fixed/*.whl
