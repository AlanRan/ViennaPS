name: Build ViennaPS Wheel (Manual Assembly)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install cmake ninja wheel delvewheel

      - name: Setup vcpkg and install dependencies
        shell: pwsh
        run: |
          $VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT
          & "$VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$VCPKG_ROOT\vcpkg" install vtk embree --triplet x64-windows
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "$VCPKG_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - name: Configure and build _core.pyd (without install)
        shell: cmd
        run: |
          set PATH=%CD%\vcpkg\installed\x64-windows\bin;%PATH%
          set CMAKE_PREFIX_PATH=%CD%\vcpkg\installed\x64-windows
          set CMAKE_GENERATOR=Visual Studio 17 2022
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target _core

      # 此时 _core.pyd 位于 build/viennaps/Release/_core.cp310-win_amd64.pyd

      - name: Assemble wheel package manually
        shell: pwsh
        run: |
          # 创建 wheel 目录结构
          $WHEEL_DIR = "wheel_staging"
          $PKG_DIR = "$WHEEL_DIR\viennaps"
          New-Item -ItemType Directory -Force -Path $PKG_DIR

          # 复制 _core.pyd
          Copy-Item "build\viennaps\Release\_core.cp310-win_amd64.pyd" -Destination "$PKG_DIR\"

          # 复制 __init__.py (从源码)
          Copy-Item "python\__init__.py" -Destination "$PKG_DIR\"

          # 复制所有需要的 DLL (从 vcpkg 的 bin 目录)
          $DLL_SRC = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          $DLLS = @(
            "embree4.dll",
            "vtkCommonCore-9.3.dll",
            "vtkCommonDataModel-9.3.dll",
            "vtkCommonExecutionModel-9.3.dll",
            "vtkCommonTransforms-9.3.dll",
            "vtkFiltersCore-9.3.dll",
            "vtkFiltersGeneral-9.3.dll",
            "vtkFiltersGeometry-9.3.dll",
            "vtkIOImage-9.3.dll",
            "vtkIOXML-9.3.dll",
            "vtkInteractionStyle-9.3.dll",
            "vtkRenderingAnnotation-9.3.dll",
            "vtkRenderingCore-9.3.dll",
            "vtkRenderingFreeType-9.3.dll",
            "vtkRenderingOpenGL2-9.3.dll",
            "vtkRenderingUI-9.3.dll",
            "vtksys-9.3.dll",
            # 可能还有 openmp 等，一并复制
            "libomp140.x86_64.dll"
          )
          foreach ($dll in $DLLS) {
            $src = Join-Path $DLL_SRC $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination "$PKG_DIR\" -Force
            } else {
              Write-Host "Warning: $dll not found" -ForegroundColor Yellow
            }
          }

          # 创建 METADATA 和 RECORD 文件 (使用 wheel 库)
          python -c "
import wheel.metadata
import json
from wheel.wheelfile import WheelFile
from wheel.util import native
import os
import time

# 准备 metadata
metadata = {
    'name': 'ViennaPS',
    'version': '4.5.0',
    'summary': 'Process Simulation Package',
    'author': 'ViennaPS Team',
    'author_email': '',
    'license': 'Apache-2.0',
    'home_page': 'https://github.com/ViennaTools/ViennaPS',
    'requires_python': '>=3.8',
    'classifiers': ['Programming Language :: Python :: 3'],
}
# 写入 METADATA 文件
meta_dir = '$WHEEL_DIR\viennaps-4.5.0.dist-info'
os.makedirs(meta_dir, exist_ok=True)
with open(os.path.join(meta_dir, 'METADATA'), 'w', encoding='utf-8') as f:
    for k, v in metadata.items():
        f.write(f'{k}: {v}\n')
# 写入 WHEEL
with open(os.path.join(meta_dir, 'WHEEL'), 'w') as f:
    f.write('Wheel-Version: 1.0\n')
    f.write('Generator: manual\n')
    f.write('Root-Is-Purelib: false\n')
    f.write('Tag: cp310-cp310-win_amd64\n')
# 写入 RECORD (稍后由 wheel 生成)
"

          # 使用 wheel 库生成 RECORD 并打包
          python -c "
import os
import wheel.wheelfile
from wheel.util import native
import sys

wheel_dir = '$WHEEL_DIR'
dist_info = os.path.join(wheel_dir, 'viennaps-4.5.0.dist-info')
records = []
# 收集所有文件
for root, dirs, files in os.walk(wheel_dir):
    for f in files:
        full = os.path.join(root, f)
        rel = os.path.relpath(full, wheel_dir).replace('\\', '/')
        # 计算 sha256 和大小
        import hashlib
        with open(full, 'rb') as fp:
            data = fp.read()
            sha = hashlib.sha256(data).hexdigest()
            size = len(data)
        records.append(f'{rel},sha256={sha},{size}')
# 写入 RECORD
with open(os.path.join(dist_info, 'RECORD'), 'w') as f:
    f.write('\n'.join(records))
    f.write('\n')

# 打包成 wheel
wheel_file = 'ViennaPS-4.5.0-cp310-cp310-win_amd64.whl'
with wheel.wheelfile.WheelFile(wheel_file, 'w') as wf:
    for root, dirs, files in os.walk(wheel_dir):
        for f in files:
            full = os.path.join(root, f)
            arcname = os.path.relpath(full, wheel_dir).replace('\\', '/')
            wf.write(full, arcname)
print(f'Wheel created: {wheel_file}')
"

          Move-Item ViennaPS-4.5.0-cp310-cp310-win_amd64.whl -Destination dist\

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: viennaps-wheel
          path: dist\*.whl
